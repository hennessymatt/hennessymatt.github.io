<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN" "http://www.w3.org/TR/REC-html40/loose.dtd"> <html><body> <p>Our paper on <a href="https://doi.org/10.1103/PhysRevE.105.054602" rel="external nofollow noopener" target="_blank">modelling the drying of poroelastic drops</a> has been accepted in PRE. Here, we propose that the alignment of desiccation fractures is controlled by the profile of the drop at the gel point.</p> </body></html>
