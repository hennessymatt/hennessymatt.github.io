<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN" "http://www.w3.org/TR/REC-html40/loose.dtd"> <html><body> <p>Our paper on <a href="https://doi.org/10.1016/j.jmps.2021.104771" rel="external nofollow noopener" target="_blank">modelling polyelectrolyte gels that undergo phase separation</a> has been accepted for publication in JMPS. We show that a novel mode of phase separation can lead to localised pattern formation and a breakdown of electroneutrality in the bulk of the gel.</p> </body></html>
