<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN" "http://www.w3.org/TR/REC-html40/loose.dtd"> <html><body> <p>Oliver’s paper on <a href="https://doi.org/10.1016/j.jmps.2022.104892" rel="external nofollow noopener" target="_blank">fluid-fluid phase separation in soft granular materials</a> has been accepted in JMPS. We derive a thermodynamically consistent model to capture the formation of cavities within the granular material when one fluid phase is strongly non-wetting.</p> </body></html>
